<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mayabtech.mx · Tecnología en Campeche y Yucatán</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ==================== HEADER ==================== -->
<header class="top-header">
    <div class="logo-area">
        <a href="index.html" class="logo" id="logo"><i class="fas fa-bolt"></i> mayabtech.mx</a>
        <a href="#visitanos" class="visit-link"><i class="fas fa-map-marker-alt"></i> Visítanos</a>
    </div>
    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Buscar productos...">
        <button id="searchButton"><i class="fas fa-search"></i></button>
    </div>
</header>

<!-- ==================== NAVEGACIÓN ==================== -->
<nav class="category-nav" id="categoryNav"></nav>

<!-- ==================== CARRUSEL ==================== -->
<section class="carousel-container" id="carousel">
    <div class="carousel-slides" id="carouselSlides"></div>
    <button class="carousel-btn prev" id="prevBtn"><i class="fas fa-chevron-left"></i></button>
    <button class="carousel-btn next" id="nextBtn"><i class="fas fa-chevron-right"></i></button>
    <div class="carousel-dots" id="carouselDots"></div>
</section>

<!-- ==================== PRODUCTOS ==================== -->
<main class="container" id="mainContainer"></main>

<!-- ==================== SECCIÓN VISÍTANOS ==================== -->
<section id="visitanos" class="visit-section">
    <div class="visit-container"></div>
</section>

<!-- ==================== FOOTER ==================== -->
<footer>
    <div class="footer-content"></div>
</footer>

<script src="script.js"></script>
</body>
</html>

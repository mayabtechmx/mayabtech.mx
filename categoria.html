<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categoría · mayabtech.mx</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .category-title {
            font-size: 32px;
            margin-bottom: 30px;
            color: var(--color-primario);
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .category-title i {
            background: var(--color-primario);
            color: white;
            padding: 15px;
            border-radius: 50%;
        }
    </style>
</head>
<body>

<header class="top-header">
    <div class="logo-area">
        <a href="index.html" class="logo" id="logo"><i class="fas fa-bolt"></i> mayabtech.mx</a>
        <a href="index.html#visitanos" class="visit-link"><i class="fas fa-map-marker-alt"></i> Visítanos</a>
    </div>
    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Buscar en esta categoría...">
        <button id="searchButton"><i class="fas fa-search"></i></button>
    </div>
</header>

<nav class="category-nav" id="categoryNav"></nav>

<main class="container">
    <div class="category-title" id="categoryTitle">
        <i class="fas fa-tag"></i>
        <span>Cargando categoría...</span>
    </div>
    <div class="product-grid" id="productGrid"></div>
</main>

<footer>
    <div class="footer-content"></div>
</footer>

<script>
    let CATEGORIAS = [];
    let PRODUCTOS = [];
    let PAGINA = { moneda: '$' };

    function getImageUrl(imageName) {
        if (!imageName) return 'https://via.placeholder.com/300x300?text=Sin+imagen';
        if (imageName.startsWith('http://') || imageName.startsWith('https://')) {
            return imageName;
        }
        return 'imagenes/' + imageName;
    }

    function getTagValue(parent, tagName) {
        if (!parent) return '';
        const element = parent.getElementsByTagName(tagName)[0];
        return element ? element.textContent : '';
    }

    async function loadConfigAndCategory() {
        try {
            const response = await fetch('config.xml');
            const xmlText = await response.text();
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(xmlText, "text/xml");
            
            // Cargar categorías
            const categorias = xmlDoc.getElementsByTagName('categorias')[0];
            if (categorias) {
                const categoriaNodes = categorias.getElementsByTagName('categoria');
                CATEGORIAS = [];
                for (let cat of categoriaNodes) {
                    CATEGORIAS.push({
                        id: cat.getAttribute('id'),
                        nombre: getTagValue(cat, 'nombre'),
                        icono: getTagValue(cat, 'icono')
                    });
                }
            }
            
            // Cargar productos
            const productos = xmlDoc.getElementsByTagName('productos')[0];
            if (productos) {
                const productoNodes = productos.getElementsByTagName('producto');
                PRODUCTOS = [];
                for (let prod of productoNodes) {
                    const imagenes = [];
                    const imgNodes = prod.getElementsByTagName('imagen');
                    for (let img of imgNodes) {
                        imagenes.push(img.textContent);
                    }
                    
                    PRODUCTOS.push({
                        id: prod.getAttribute('id'),
                        nombre: getTagValue(prod, 'nombre'),
                        categoria: getTagValue(prod, 'categoria'),
                        precio: parseInt(getTagValue(prod, 'precio')) || 0,
                        descripcion: getTagValue(prod, 'descripcion'),
                        imagenes: imagenes,
                        envio_gratis: getTagValue(prod, 'envio_gratis') === 'true'
                    });
                }
            }
            
            // Cargar configuración de página
            const pagina = xmlDoc.getElementsByTagName('pagina')[0];
            PAGINA = {
                moneda: getTagValue(pagina, 'moneda') || '$'
            };
            
            renderCategory();
            
        } catch (error) {
            console.error('Error:', error);
        }
    }
    
    function renderCategory() {
        const urlParams = new URLSearchParams(window.location.search);
        const categoryId = urlParams.get('cat');
        
        const category = CATEGORIAS.find(c => c.id === categoryId);
        if (!category) {
            window.location.href = 'index.html';
            return;
        }
        
        // Actualizar título
        const titleElement = document.getElementById('categoryTitle');
        titleElement.innerHTML = `
            <i class="fas ${category.icono}"></i>
            <span>${category.nombre}</span>
        `;
        
        // Filtrar productos
        const productosCat = PRODUCTOS.filter(p => p.categoria === categoryId);
        
        // Renderizar productos
        const grid = document.getElementById('productGrid');
        grid.innerHTML = '';
        
        if (productosCat.length === 0) {
            grid.innerHTML = '<p style="text-align: center; padding: 40px;">No hay productos en esta categoría</p>';
            return;
        }
        
        productosCat.forEach(prod => {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.onclick = () => {
                window.location.href = `producto.html?id=${prod.id}`;
            };
            
            const imgSrc = prod.imagenes && prod.imagenes[0] 
                ? getImageUrl(prod.imagenes[0])
                : 'https://via.placeholder.com/200x200?text=Producto';
            
            card.innerHTML = `
                <img class="product-img" src="${imgSrc}" alt="${prod.nombre}" onerror="this.src='https://via.placeholder.com/200x200?text=Sin+imagen'">
                <h3 class="product-title">${prod.nombre}</h3>
                <div class="product-price">${PAGINA.moneda}${prod.precio.toLocaleString()}</div>
                ${prod.envio_gratis ? '<div class="product-shipping"><i class="fas fa-truck"></i> Envío gratis</div>' : ''}
                <p class="product-description">${prod.descripcion}</p>
                <div class="product-footer">
                    <button class="btn-buy" onclick="event.stopPropagation()"><i class="fas fa-bolt"></i> Comprar</button>
                    <i class="far fa-heart" onclick="event.stopPropagation()"></i>
                </div>
            `;
            grid.appendChild(card);
        });
        
        // Construir menú de navegación
        const categoryNav = document.getElementById('categoryNav');
        categoryNav.innerHTML = '<a href="index.html"><i class="fas fa-home"></i> Inicio</a>';
        CATEGORIAS.forEach(cat => {
            const link = document.createElement('a');
            link.href = `categoria.html?cat=${cat.id}`;
            link.innerHTML = `<i class="fas ${cat.icono}"></i> ${cat.nombre}`;
            if (cat.id === categoryId) {
                link.classList.add('active');
            }
            categoryNav.appendChild(link);
        });
    }
    
    // Búsqueda dentro de categoría
    document.getElementById('searchButton')?.addEventListener('click', () => {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const cards = document.querySelectorAll('.product-card');
        
        cards.forEach(card => {
            const title = card.querySelector('.product-title').textContent.toLowerCase();
            const desc = card.querySelector('.product-description').textContent.toLowerCase();
            
            if (title.includes(term) || desc.includes(term)) {
                card.style.display = 'flex';
            } else {
                card.style.display = 'none';
            }
        });
    });
    
    document.getElementById('searchInput')?.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            document.getElementById('searchButton').click();
        }
    });
    
    loadConfigAndCategory();
</script>
</body>
</html>
